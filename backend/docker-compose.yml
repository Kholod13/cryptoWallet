version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: cryptowallet_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin4811
      POSTGRES_DB: cryptowallet
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: