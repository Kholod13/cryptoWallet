<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Внешний контур -->
    <circle cx="50" cy="50" r="44" stroke="#362F5E" stroke-width="2" stroke-dasharray="4 6" />

    <!-- Основные кольца (статичный срез) -->
    <circle cx="50" cy="50" r="35" stroke="#10B981" stroke-width="14" stroke-linecap="round" stroke-dasharray="60 200" />
    <circle cx="50" cy="50" r="35" stroke="gray" stroke-width="14" stroke-linecap="round" stroke-dasharray="40 200" transform="rotate(120 50 50)" />
    <circle cx="50" cy="50" r="35" stroke="#362F5E" stroke-width="14" stroke-linecap="round" stroke-dasharray="30 200" transform="rotate(240 50 50)" />

    <!-- Центральный кристалл -->
    <rect x="35" y="35" width="30" height="30" rx="6" fill="#362F5E" transform="rotate(45 50 50)" />

    <!-- Блик в центре -->
    <circle cx="50" cy="50" r="4" fill="white" />
</svg>